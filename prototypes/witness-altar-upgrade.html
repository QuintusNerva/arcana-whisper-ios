<!-- PROTOTYPE V2 — with Neocortex UX fixes applied -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Arcana Whisper — Witness / Altar Prototype</title>

<!-- Fonts: Cinzel + Inter from Google Fonts (prototype only) -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

<style>
/* ══════════════════════════════════════════════════
   SACRED FINTECH DESIGN SYSTEM — TOKEN LAYER
   ══════════════════════════════════════════════════ */
:root {
  /* Brand Purples */
  --altar-deep:   #120224;
  --altar-dark:   #1F0D38;
  --altar-mid:    #2d1b4e;
  --altar-bright: #432c7a;
  --altar-purple: #2A0B4B;

  /* 5-Tier Gold */
  --gold-100: #F9E491;
  --gold-200: #D4A94E;
  --gold-300: #C59341;
  --gold-400: #A67B2E;
  --gold-500: #8a6914;

  /* Gold Glow */
  --gold-glow-soft:   rgba(212,175,55, 0.08);
  --gold-glow-med:    rgba(212,175,55, 0.18);
  --gold-glow-strong: rgba(212,175,55, 0.35);
  --gold-glow-neon:   rgba(249,228,145, 0.4);

  /* Text */
  --text:      #e2e8f0;
  --muted:     #94a3b8;
  --muted-dim: rgba(148,163,184, 0.5);

  /* Spacing */
  --sp-xs: 4px;
  --sp-sm: 8px;
  --sp-md: 12px;
  --sp-lg: 16px;
  --sp-xl: 20px;
  --sp-2xl: 24px;
  --sp-3xl: 28px;
}

/* ── RESET ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { 
  width: 100%; height: 100%; overflow: hidden; 
  background: var(--altar-deep);
  -webkit-font-smoothing: antialiased;
}
#root {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  overflow: hidden;
}

/* ── TYPOGRAPHY ── */
.font-display { font-family: 'Cinzel', serif; }
.font-body    { font-family: 'Inter', sans-serif; }
body { font-family: 'Inter', sans-serif; color: var(--text); }

/* ── PAGE LAYOUT ── */
.page-frame {
  display: flex; flex-direction: column;
  height: 100%; width: 100%; overflow: hidden;
}
.page-scroll {
  flex: 1; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: none;
  min-height: 0;
  scrollbar-width: none;
}
.page-scroll::-webkit-scrollbar { display: none; }
.page-content {
  max-width: 500px;
  margin: 0 auto;
  width: 100%;
}

/* ══════════════════════════════════════════════════
   SHADOW SYSTEM
   ══════════════════════════════════════════════════ */
.shadow-primary-card {
  box-shadow:
    0 8px 28px rgba(0,0,0, 0.5),
    0 2px 6px  rgba(0,0,0, 0.4),
    inset 0  1px 1px rgba(255,255,255, 0.08),
    inset 0 -2px 5px rgba(0,0,0, 0.35);
}
.shadow-info-card {
  box-shadow: 0 2px 8px rgba(0,0,0, 0.2);
}
.shadow-cta {
  box-shadow:
    0 2px 0   var(--gold-500),
    0 4px 12px rgba(0,0,0, 0.5),
    0 0  40px  var(--gold-glow-soft),
    inset 0 1px 0 rgba(255,255,255, 0.35);
}

/* ══════════════════════════════════════════════════
   COMPONENT: PRIMARY CARD
   ══════════════════════════════════════════════════ */
.primary-card {
  background: linear-gradient(160deg, #1c1538, #130f2e 55%, #0d0b22);
  border: 1px solid rgba(255,255,255, 0.07);
  border-radius: 22px;
  padding: var(--sp-2xl);
  margin-bottom: var(--sp-lg);
  box-shadow:
    0 8px 28px rgba(0,0,0, 0.5),
    0 2px 6px  rgba(0,0,0, 0.4),
    inset 0  1px 1px rgba(255,255,255, 0.08),
    inset 0 -2px 5px rgba(0,0,0, 0.35);
}

/* ══════════════════════════════════════════════════
   COMPONENT: INFO CARD
   ══════════════════════════════════════════════════ */
.info-card {
  background: rgba(61,29,90, 0.35);
  border: 1px solid rgba(212,175,55, 0.10);
  border-radius: 16px;
  padding: 14px 16px;
  margin-bottom: var(--sp-sm);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 2px 8px rgba(0,0,0, 0.2);
}
.info-card--active {
  background: linear-gradient(135deg, rgba(197,147,65,0.08), rgba(61,29,90,0.4));
}

/* ══════════════════════════════════════════════════
   COMPONENT: GOLD CTA BUTTON
   ══════════════════════════════════════════════════ */
.cta-gold {
  position: relative;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%;
  background: linear-gradient(180deg, #F9E491, #D4A94E 30%, #C59341 60%, #A67B2E);
  border: 2px solid rgba(212,175,55, 0.6);
  border-radius: 20px;
  padding: 18px 24px;
  font-family: 'Cinzel', serif;
  font-weight: 800;
  font-size: 14px;
  letter-spacing: 3.5px;
  text-transform: uppercase;
  color: var(--altar-deep);
  cursor: pointer;
  box-shadow:
    0 2px 0   var(--gold-500),
    0 4px 12px rgba(0,0,0, 0.5),
    0 0  40px  var(--gold-glow-soft),
    inset 0 1px 0 rgba(255,255,255, 0.35);
  overflow: hidden;
  transition: transform 0.1s ease;
}
.cta-gold:active { transform: scale(0.98); }
.cta-gold .shimmer-sweep {
  position: absolute; top: 0; left: -100%; right: 0; bottom: 0;
  width: 200%;
  background: linear-gradient(90deg, transparent 30%, rgba(255,255,255,0.22) 50%, transparent 70%);
  animation: shimmer-sweep 3.5s ease-in-out infinite;
}

/* ══════════════════════════════════════════════════
   COMPONENT: STATUS PILLS
   ══════════════════════════════════════════════════ */
.pill-active {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(197,147,65, 0.12);
  color: var(--gold-200);
  border: 1px solid rgba(197,147,65, 0.25);
  border-radius: 999px;
  padding: 4px 12px;
  font-family: 'Cinzel', serif;
  font-size: 9px; font-weight: 400;
  letter-spacing: 1.5px; text-transform: uppercase;
}
.pill-inactive {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(148,163,184, 0.06);
  color: rgba(180,170,200, 0.5);
  border: 1px solid rgba(255,255,255, 0.06);
  border-radius: 999px;
  padding: 4px 12px;
  font-family: 'Cinzel', serif;
  font-size: 9px; font-weight: 400;
  letter-spacing: 1.5px; text-transform: uppercase;
}

.live-dot {
  width: 6px; height: 6px;
  background: var(--gold-200);
  border-radius: 50%;
  animation: live-pulse 2s ease-in-out infinite;
}

/* ══════════════════════════════════════════════════
   COMPONENT: PROGRESS BAR
   ══════════════════════════════════════════════════ */
.progress-track {
  height: 8px; border-radius: 8px;
  background: rgba(197,147,65, 0.1);
  overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: 8px;
  background: linear-gradient(90deg, var(--gold-300), var(--gold-200), var(--gold-100), var(--gold-200));
  box-shadow: 0 0 14px var(--gold-glow-med), 0 0 4px var(--gold-glow-strong);
}

/* ══════════════════════════════════════════════════
   COMPONENT: STAT BADGES
   ══════════════════════════════════════════════════ */
.stat-readings {
  background: rgba(99,102,241, 0.1); color: #a5b4fc;
  border: 1px solid rgba(99,102,241, 0.15);
  border-radius: 12px; padding: 8px 12px;
  font-family: 'Inter', sans-serif; font-weight: 500; font-size: 10px;
  letter-spacing: 0.3px;
}
.stat-actions {
  background: rgba(52,211,153, 0.08); color: #6ee7b7;
  border: 1px solid rgba(52,211,153, 0.15);
  border-radius: 12px; padding: 8px 12px;
  font-family: 'Inter', sans-serif; font-weight: 500; font-size: 10px;
  letter-spacing: 0.3px;
}
.stat-manifested {
  background: rgba(197,147,65, 0.10); color: var(--gold-200);
  border: 1px solid rgba(197,147,65, 0.2);
  border-radius: 12px; padding: 8px 12px;
  font-family: 'Inter', sans-serif; font-weight: 500; font-size: 10px;
  letter-spacing: 0.3px;
}

/* ══════════════════════════════════════════════════
   COMPONENT: SECTION LABEL
   ══════════════════════════════════════════════════ */
.section-label {
  font-family: 'Cinzel', serif;
  font-size: 9px; font-weight: 400;
  letter-spacing: 5px; text-transform: uppercase;
  color: var(--gold-200); opacity: 0.5;
  text-shadow: 0 0 10px var(--gold-glow-soft);
}

/* ══════════════════════════════════════════════════
   COMPONENT: PORTAL CARD (tile)
   ══════════════════════════════════════════════════ */
/* V3 — PREMIUM PORTAL CARDS */
.portal-card {
  position: relative;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px;
  border-radius: 20px;
  padding: 20px 10px 16px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
  aspect-ratio: 1 / 1.15;
  /* UNIFIED dark glass — no per-card rainbow */
  background: linear-gradient(165deg, rgba(35,20,60,0.85) 0%, rgba(18,10,40,0.95) 100%);
  border: 1px solid rgba(212,175,55,0.12);
  box-shadow:
    0 8px 32px rgba(0,0,0, 0.45),
    0 2px 8px  rgba(0,0,0, 0.35),
    inset 0 1px 0 rgba(255,255,255, 0.06),
    inset 0 -3px 10px rgba(0,0,0, 0.3);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.portal-card:hover {
  transform: scale(1.04) translateY(-2px);
  box-shadow:
    0 12px 40px rgba(0,0,0, 0.55),
    0 4px 12px  rgba(0,0,0, 0.4),
    inset 0 1px 0 rgba(255,255,255, 0.08),
    0 0 20px rgba(212,175,55,0.08);
  border-color: rgba(212,175,55,0.22);
}
.portal-card:active { transform: scale(0.96); }

/* Gold top accent line */
.portal-card__shine {
  position: absolute; top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(to right, transparent 10%, rgba(212,175,55,0.35) 50%, transparent 90%);
}

/* Subtle gold inner glow at top */
.portal-card__glow {
  position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
  width: 60%; height: 30px;
  filter: blur(20px); opacity: 0.08;
  background: var(--gold-200);
  pointer-events: none;
}

/* SVG icon container — no more dark circle with neon halo */
.portal-card__icon {
  position: relative; z-index: 2;
  width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.portal-card__icon svg {
  width: 36px; height: 36px;
  stroke: var(--gold-200);
  stroke-width: 1.2;
  fill: none;
  filter: drop-shadow(0 0 6px var(--gold-glow-soft));
  transition: filter 0.2s ease, stroke 0.2s ease;
}
.portal-card:hover .portal-card__icon svg {
  stroke: var(--gold-100);
  filter: drop-shadow(0 0 10px var(--gold-glow-med));
}

.portal-card__label {
  position: relative; z-index: 2;
  font-family: 'Cinzel', serif;
  font-size: 11px; font-weight: 600;
  color: var(--gold-100);
  text-align: center;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.portal-card__tagline {
  position: relative; z-index: 2;
  font-family: 'Inter', sans-serif;
  font-size: 10px; color: rgba(226,232,240, 0.65);
  text-align: center; line-height: 1.4;
  padding: 0 2px;
  font-weight: 300;
}

/* ══════════════════════════════════════════════════
   LAYOUT: HEADER
   ══════════════════════════════════════════════════ */
.altar-header {
  position: relative;
  text-align: center;
  padding: var(--sp-lg) var(--sp-xl) var(--sp-sm);
  z-index: 10;
}
.altar-header::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, var(--altar-deep), transparent);
}
.altar-header__title {
  position: relative;
  font-family: 'Cinzel', serif;
  font-size: 13px; font-weight: 700;
  letter-spacing: 6px; text-transform: uppercase;
  color: var(--gold-100);
}
.altar-header__star {
  color: var(--gold-100);
  animation: breathe 4s ease-in-out infinite;
  display: inline-block;
}
.altar-header__greeting {
  position: relative;
  font-family: 'Inter', sans-serif;
  font-size: 12px; font-weight: 300;
  color: rgba(226,232,240, 0.75);
  letter-spacing: 0.5px;
  margin-top: 6px;
}
.altar-header__gear {
  position: absolute; right: 16px; top: 20px; z-index: 20;
  opacity: 0.4; font-size: 17px;
  background: none; border: none; cursor: pointer;
  transition: opacity 0.15s ease;
}
.altar-header__gear:hover { opacity: 0.7; }

/* ══════════════════════════════════════════════════
   LAYOUT: COSMIC BLUEPRINT CARD
   ══════════════════════════════════════════════════ */
.blueprint-card {
  position: relative;
  margin: var(--sp-lg) var(--sp-xl);
  border-radius: 22px;
  overflow: hidden;
  background: linear-gradient(160deg, #1c1538 0%, #130f2e 50%, #0d0b22 100%);
  border: 1px solid rgba(255,255,255, 0.07);
  box-shadow:
    0 8px 28px rgba(0,0,0, 0.5),
    0 2px 6px  rgba(0,0,0, 0.4),
    inset 0  1px 1px rgba(255,255,255, 0.08),
    inset 0 -2px 5px rgba(0,0,0, 0.35);
}
/* Blueprint top-edge shimmer */
.blueprint-card::before {
  content: '';
  position: absolute; top: 0; left: -100%; right: 0;
  height: 1px; width: 200%;
  background: linear-gradient(90deg, transparent 30%, rgba(255,255,255,0.20) 50%, transparent 70%);
  animation: shimmer-sweep 5s ease-in-out infinite;
  z-index: 20;
}
.blueprint-card__header {
  padding: var(--sp-xl) var(--sp-xl) var(--sp-md);
}
.blueprint-card__title-row {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: var(--sp-xs);
}
.blueprint-card__title {
  font-family: 'Cinzel', serif;
  font-size: 14px; font-weight: 700;
  color: var(--gold-200);
  letter-spacing: 3px; text-transform: uppercase;
  display: flex; align-items: center; gap: 8px;
}
.blueprint-card__title-icon {
  width: 22px; height: 22px;
  display: inline-flex; align-items: center; justify-content: center;
}
.blueprint-card__title-icon svg {
  width: 20px; height: 20px;
  stroke: var(--gold-200);
  stroke-width: 1.2;
  fill: none;
  filter: drop-shadow(0 0 4px var(--gold-glow-soft));
}

/* Moon pill */
.moon-pill {
  display: flex; align-items: center; gap: 6px;
  border-radius: 999px;
  padding: 4px 10px;
  background: linear-gradient(145deg, #1a1040, #110b2a);
  border: 1px solid rgba(167,139,250,0.15);
  cursor: pointer;
  transition: filter 0.15s ease, transform 0.1s ease;
  box-shadow:
    inset 0 1px 1px rgba(255,255,255,0.12),
    inset 0 -2px 4px rgba(0,0,0,0.35),
    0 4px 12px rgba(109,40,217,0.35),
    0 1px 3px rgba(0,0,0,0.4);
}
.moon-pill:hover { filter: brightness(1.25); }
.moon-pill:active { transform: scale(0.95); }
.moon-pill__emoji { font-size: 14px; }
.moon-pill__label {
  font-family: 'Cinzel', serif;
  font-size: 9px; color: rgba(196,181,253,0.8);
  letter-spacing: 1.5px;
}
.moon-pill__arrow { font-size: 8px; color: rgba(196,181,253,0.6); }

/* Triad grid (Sun / Moon / Rising) */
.triad-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: var(--sp-sm);
  margin-bottom: var(--sp-md);
}
.triad-pill {
  border-radius: 16px;
  padding: 10px;
  text-align: center;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 58px;
  cursor: pointer;
  transition: all 0.2s ease;
}
.triad-pill:hover { filter: brightness(1.1); transform: scale(1.03); }
.triad-pill:active { transform: scale(0.97); }
.triad-pill__label {
  font-family: 'Cinzel', serif;
  font-size: 10px; letter-spacing: 2.5px;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.triad-pill__value {
  font-size: 13px; font-weight: 700;
  line-height: 1.2;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* Life Path + Personal Year */
.insights-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: var(--sp-sm);
}
.insight-tile {
  border-radius: 16px;
  padding: var(--sp-md);
  text-align: left;
  cursor: pointer;
  transition: all 0.2s ease;
}
.insight-tile:hover { filter: brightness(1.1); transform: scale(1.02); }
.insight-tile:active { transform: scale(0.97); }
.insight-tile__label {
  font-family: 'Cinzel', serif;
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  margin-bottom: var(--sp-xs);
  display: flex; align-items: center; justify-content: space-between;
}
.insight-tile__label .arrow { font-size: 10px; opacity: 0.8; }
.insight-tile__value {
  font-size: 14px; font-weight: 700;
  margin-bottom: 2px;
}
.insight-tile__value .sub {
  font-size: 10px; font-weight: 400; opacity: 0.8;
}
.insight-tile__desc {
  font-family: 'Inter', sans-serif;
  font-size: 11px; line-height: 1.5;
  opacity: 0.75; margin-top: 6px;
}
.insight-tile__meta {
  font-family: 'Inter', sans-serif;
  font-size: 10px; line-height: 1.5;
  opacity: 0.8; margin-top: var(--sp-sm);
  display: flex; flex-direction: column; gap: 4px;
}
.insight-tile__meta span.icon { opacity: 1; }

/* Blueprint CTA area */
.blueprint-cta {
  padding: var(--sp-xs) var(--sp-xl) var(--sp-lg);
}

/* Blueprint footer actions */
.blueprint-footer-action {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 10px var(--sp-xl);
  border-top: 1px solid rgba(255,255,255, 0.05);
  background: transparent; border-left: none; border-right: none; border-bottom: none;
  cursor: pointer;
  transition: background 0.15s ease;
}
.blueprint-footer-action:hover { background: rgba(255,255,255, 0.04); }
.blueprint-footer-action__label {
  font-family: 'Cinzel', serif;
  font-size: 9px; color: rgba(212,175,55,0.7);
  letter-spacing: 2px; text-transform: uppercase;
  text-shadow: 0 0 10px var(--gold-glow-soft);
}
.blueprint-footer-action__arrow {
  font-family: 'Cinzel', serif;
  font-size: 9px; color: rgba(212,175,55,0.5);
}

/* Scripting shortcut */
.scripting-shortcut {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; padding: 14px var(--sp-xl);
  border-top: 1px solid rgba(255,255,255, 0.05);
  background: transparent; border-left: none; border-right: none; border-bottom: none;
  cursor: pointer;
  transition: background 0.15s ease;
}
.scripting-shortcut:hover { background: rgba(255,255,255, 0.04); }
.scripting-shortcut__text {
  display: flex; align-items: center; gap: 8px;
  font-family: 'Cinzel', serif;
  font-size: 11px; font-style: italic;
  color: rgba(212,175,55, 0.85);
  text-shadow: 0 0 12px var(--gold-glow-soft);
}
.scripting-shortcut__pen {
  font-size: 16px;
  filter: drop-shadow(0 0 6px rgba(212,175,55,0.5));
}
.scripting-shortcut__action {
  font-family: 'Cinzel', serif;
  font-size: 9px; color: rgba(212,175,55,0.4);
  transition: color 0.15s ease;
}
.scripting-shortcut:hover .scripting-shortcut__action {
  color: rgba(212,175,55,0.6);
}

/* ══════════════════════════════════════════════════
   LAYOUT: PORTAL GRID
   ══════════════════════════════════════════════════ */
.portal-section {
  margin: 0 var(--sp-md) var(--sp-lg);
}
.portal-section__title {
  font-family: 'Cinzel', serif;
  font-size: 20px; font-weight: 700;
  letter-spacing: 5px; text-transform: uppercase;
  color: var(--gold-100);
  text-align: center;
  margin-bottom: var(--sp-lg);
}
.portal-section__title .star { color: var(--gold-100); }
.portal-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

/* ══════════════════════════════════════════════════
   LAYOUT: PREMIUM BANNER
   ══════════════════════════════════════════════════ */
.premium-banner {
  margin: var(--sp-lg) var(--sp-xl);
  border-radius: 22px;
  padding: 1px;
  background: linear-gradient(to right,
    rgba(212,175,55,0.5),
    rgba(67,44,122,0.3),
    rgba(212,175,55,0.5)
  );
  cursor: pointer;
  transition: transform 0.15s ease;
}

   ══════════════════════════════════════════════════ */

  -webkit-backdrop-filter: blur(12px);

}



/* ══════════════════════════════════════════════════
   BOTTOM NAV
   ══════════════════════════════════════════════════ */
.bottom-nav {
  flex-shrink: 0;
  display: flex; align-items: stretch;
  background: rgba(18,2,36, 0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255,255,255, 0.06);
  padding: 8px 0 max(6px, env(safe-area-inset-bottom, 6px));
}
.bottom-nav__item {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 2px;
  padding: 6px 0;
  background: none; border: none; cursor: pointer;
  transition: opacity 0.15s ease;
}
.bottom-nav__icon {
  font-size: 22px;
  transition: transform 0.15s ease;
  display: flex; align-items: center; justify-content: center;
}
.bottom-nav__icon svg {
  width: 22px; height: 22px;
  fill: var(--gold-200);
  stroke: none;
  transition: transform 0.15s ease, filter 0.15s ease;
}
.bottom-nav__item--active .bottom-nav__icon svg {
  filter: drop-shadow(0 0 6px var(--gold-glow-soft));
}
.bottom-nav__label {
  font-family: 'Cinzel', serif;
  font-size: 9px; letter-spacing: 1.5px;
  text-transform: uppercase;
}
.bottom-nav__item--active .bottom-nav__icon { transform: scale(1.15); }
.bottom-nav__item--active .bottom-nav__label { color: var(--gold-200); }
.bottom-nav__item:not(.bottom-nav__item--active) {
  opacity: 0.4;
}
.bottom-nav__item:not(.bottom-nav__item--active):hover {
  opacity: 0.65;
}

/* ══════════════════════════════════════════════════
   SECTION SPACER
   ══════════════════════════════════════════════════ */
.section-spacer {
  display: flex; align-items: center; justify-content: center;
  margin: var(--sp-md) var(--sp-xl);
  height: 1px; position: relative;
}
.section-spacer::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to right, transparent, rgba(212,175,55,0.10), transparent);
}
.section-spacer svg {
  position: relative; z-index: 1;
}

/* ══════════════════════════════════════════════════
   PARTICLES
   ══════════════════════════════════════════════════ */
.particles {
  position: fixed; inset: 0;
  pointer-events: none; overflow: hidden;
  z-index: 0;
}
.particles span {
  position: absolute;
  color: var(--gold-200);
  animation: particle-drift linear infinite;
}

/* ══════════════════════════════════════════════════
   ANIMATIONS
   ══════════════════════════════════════════════════ */
@keyframes breathe {
  0%, 100% { opacity: 0.6; transform: scale(1); }
  50%      { opacity: 1;   transform: scale(1.15); }
}
@keyframes shimmer-sweep {
  0%   { transform: translateX(-50%); }
  100% { transform: translateX(50%); }
}
@keyframes shimmer {
  0%   { background-position: -200% center; }
  100% { background-position: 200% center; }
}
@keyframes fade-up {
  0%   { opacity: 0; transform: translateY(20px); }
  100% { opacity: 1; transform: translateY(0); }
}
@keyframes fade-up-scale {
  0%   { opacity: 0; transform: translateY(16px) scale(0.97); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes live-pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50%      { opacity: 0.4; transform: scale(0.8); }
}
@keyframes particle-drift {
  0%   { transform: translateY(0) rotate(0deg);   opacity: 0; }
  10%  { opacity: 0.3; }
  90%  { opacity: 0.1; }
  100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
}
@keyframes spring-press {
  0%   { transform: scale(1); }
  30%  { transform: scale(0.93); }
  60%  { transform: scale(1.02); }
  100% { transform: scale(1); }
}

/* Staggered fade-up */
.fade-up {
  opacity: 0;
  animation: fade-up 0.8s ease-out forwards;
}
.fade-up-scale {
  opacity: 0;
  animation: fade-up-scale 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}
.delay-1 { animation-delay: 0.1s; }
.delay-2 { animation-delay: 0.2s; }
.delay-3 { animation-delay: 0.35s; }
.delay-4 { animation-delay: 0.45s; }
.delay-5 { animation-delay: 0.55s; }
.delay-6 { animation-delay: 0.65s; }
.delay-7 { animation-delay: 0.75s; }
.delay-8 { animation-delay: 0.85s; }

/* Portal card spring press */
.portal-card:active {
  animation: spring-press 0.4s ease forwards;
}

<script>
// Generate ambient particles
(function() {
  const container = document.getElementById('particles');
  const chars = ['✦', '✧', '·', '⊹', '✶', '☆'];
  for (let i = 0; i < 25; i++) {
    const span = document.createElement('span');
    span.textContent = chars[i % chars.length];
    span.style.left = `${(i * 29 + 11) % 100}%`;
    span.style.top = `${Math.random() * 100}%`;
    span.style.fontSize = i % 4 === 0 ? '14px' : '10px';
    span.style.opacity = '0';
    span.style.animationDuration = `${8 + (i % 5) * 3}s`;
    span.style.animationDelay = `${(i * 0.7) % 10}s`;
    container.appendChild(span);
  }
})();
</script>
